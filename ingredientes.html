<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cadastre e gerencie os ingredientes do seu ateliê, com custos sempre atualizados." />
  <title>Konditor | Ingredientes</title>
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="color-scheme" content="light" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/konditor.css" />
  <link rel="stylesheet" href="assets/css/tailwind.css" />
  <script src="assets/js/konditor-config.js"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Cdefs%3E%3ClinearGradient%20id='b'%20x1='0'%20y1='0'%20x2='1'%20y2='1'%3E%3Cstop%20offset='0'%20stop-color='%23e01466'/%3E%3Cstop%20offset='1'%20stop-color='%23ffa9b9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20width='32'%20height='32'%20rx='8'%20fill='url(%23b)'/%3E%3Csvg%20x='3'%20y='3'%20width='26'%20height='26'%20viewBox='0%20-960%20960%20960'%20preserveAspectRatio='xMidYMid%20meet'%3E%3Cpath%20fill='%23fff7f7'%20d='m835-252-99-34%2078-215%2085%20175q14%2027-12%2055t-52%2019Zm-251-38%2043-374q2-15%2013.5-20.5t27.5-.5l100%2037q14%206%2018.5%2018t-.5%2026L673-290h-89Zm-296%200L175-604q-5-14-.5-26.5T193-648l100-37q14-6%2026.5-.5T334-664l42%20374h-88Zm-172%2038q-26%208-47-19.5T62-326l86-175%2077%20215-109%2034Zm320-38-48-430q-2-17%209.5-28.5T426-760h108q17%200%2028.5%2011.5T572-720l-48%20430h-88Z'/%3E%3C/svg%3E%3C/svg%3E" />
  <meta name="theme-color" content="#e01466" />
</head>
<body class="bg-background font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container">
  <a href="#main-content" class="skip-link">Ir para o conteudo principal</a>

  <!-- Mobile sidebar overlay -->
  <div id="sidebar-overlay" class="fixed inset-0 z-30 bg-black/40 opacity-0 pointer-events-none lg:hidden" aria-hidden="true"></div>

  <aside id="app-sidebar" class="h-screen w-64 fixed left-0 top-0 z-40 bg-surface-container-lowest flex flex-col p-6 gap-2 -translate-x-full lg:translate-x-0" aria-label="Menu principal"></aside>

  <!-- Main Content -->
  <main id="main-content" class="lg:ml-64 p-6 md:p-10 min-h-[calc(100vh-64px)]">
    <div class="max-w-6xl mx-auto">

      <!-- Page Header -->
      <section class="mb-10 flex flex-wrap items-end justify-between gap-6">
        <div class="space-y-2">
          <span class="text-xs font-bold tracking-[0.2em] text-primary uppercase font-label">Câmara Fria</span>
          <h2 class="text-4xl md:text-5xl font-extrabold font-headline text-on-surface tracking-tight leading-tight">Gestão de <span class="text-primary italic">Ingredientes</span></h2>
          <p class="text-on-surface-variant max-w-md font-body text-lg">Matérias-primas do seu ateliê, com custos sempre à mão.</p>
        </div>
        <a href="criar-ingrediente.html" class="flex items-center gap-2 px-6 py-3 rounded-full berry-gradient text-on-primary font-headline font-bold text-sm shadow-xl shadow-primary/20 hover:scale-105 transition-transform active:scale-95">
          <span class="material-symbols-outlined text-base">add</span>
          Novo Ingrediente
        </a>
      </section>

      <!-- Stats -->
      <div class="mb-10">
        <div class="inline-flex items-center gap-4 bg-primary-container/20 rounded-3xl px-6 py-4">
          <div class="w-10 h-10 rounded-2xl bg-primary/10 flex items-center justify-center text-primary shrink-0">
            <span class="material-symbols-outlined">inventory_2</span>
          </div>
          <div>
            <p id="stat-total-ingredientes" class="text-3xl font-extrabold font-headline text-primary leading-none">—</p>
            <p class="text-xs font-bold uppercase tracking-wider text-on-surface-variant mt-1">Ingredientes Catalogados</p>
          </div>
        </div>
      </div>

      <!-- Filter Chips -->
      <div class="flex items-center gap-3 overflow-x-auto pb-2 mb-8" id="filter-chips-ingredientes">
        <button type="button" data-ingr-chip aria-pressed="true" class="px-5 py-2.5 rounded-full bg-primary text-on-primary font-headline font-bold text-sm whitespace-nowrap">Todo Estoque</button>
        <!-- chips de categoria carregados dinamicamente -->
      </div>

      <!-- Ingredients Grid -->
      <div id="ingredientes-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-3">
      </div>
    </div>
  </main>
  <script src="assets/js/konditor-app.js" defer></script>
</body>
</html>
