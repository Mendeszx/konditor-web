<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Centralize e gerencie suas receitas artesanais com calculo automatico de custos e margens." />
  <title>Konditor | Receitas</title>
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/konditor.css" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="assets/js/konditor-config.js"></script>
</head>
<body class="bg-background font-body text-on-surface antialiased">
  <a href="#main-content" class="skip-link">Ir para o conteudo principal</a>

  <!-- Mobile sidebar overlay -->
  <div id="sidebar-overlay" class="fixed inset-0 z-30 bg-black/40 opacity-0 pointer-events-none lg:hidden" aria-hidden="true"></div>

  <aside id="app-sidebar" class="h-screen w-64 fixed left-0 top-0 z-40 bg-surface-container-lowest flex flex-col p-6 gap-2 -translate-x-full lg:translate-x-0" aria-label="Menu principal"></aside>

  <!-- Main Content -->
  <main id="main-content" class="lg:ml-64 p-10 min-h-[calc(100vh-64px)]">
    <div class="max-w-6xl mx-auto">

      <!-- Page Header + Stats -->
      <section class="mb-10 grid grid-cols-1 lg:grid-cols-2 gap-8 items-stretch">

        <!-- Left: title + description + stats -->
        <div class="flex flex-col justify-between gap-6">
          <div class="space-y-2">
            <span class="text-xs font-bold tracking-[0.2em] text-primary uppercase font-label">Laboratório</span>
            <h2 class="text-5xl font-extrabold font-headline text-on-surface tracking-tight leading-tight">
              Minhas <span class="text-primary italic">Receitas</span>
            </h2>
            <p class="text-on-surface-variant max-w-md font-body text-lg">Gerencie todas as suas criações artesanais com precisão financeira.</p>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div class="bg-surface-container-lowest p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-1">
              <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Total de Receitas</p>
              <p id="stat-total-receitas" class="text-4xl font-headline font-extrabold text-on-surface">—</p>
            </div>
            <div class="bg-surface-container-lowest p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-1">
              <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Margem Média</p>
              <p id="stat-margem-media" class="text-4xl font-headline font-extrabold text-secondary">—</p>
            </div>
          </div>
        </div>

        <!-- Right: actions + best margin card -->
          <div class="flex flex-col justify-between gap-6">
            <div class="flex gap-3 justify-end">
              <button type="button" id="btn-ver-rascunhos" class="px-5 py-3 rounded-full bg-surface-container-highest text-on-surface font-headline font-bold text-sm border-2 border-transparent hover:opacity-80 transition-all active:scale-95 flex items-center gap-2">
                <span class="material-symbols-outlined text-base">edit_note</span> Rascunhos
              </button>
              <a href="criar-receita.html" class="px-7 py-3 rounded-full berry-gradient text-on-primary font-headline font-bold text-sm shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 hover:scale-105 active:scale-95 transition-all duration-200 flex items-center gap-2">
                <span class="material-symbols-outlined text-lg">add</span> Nova Receita
              </a>
            </div>
          <div class="bg-primary p-6 rounded-2xl shadow-lg shadow-primary/20 text-on-primary relative overflow-hidden flex-1 flex flex-col justify-end min-h-[120px]">
            <div class="absolute -right-4 -bottom-4 opacity-10">
              <span class="material-symbols-outlined text-9xl">cake</span>
            </div>
            <p class="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-2">Melhor Margem</p>
            <p id="stat-melhor-nome" class="text-2xl font-headline font-extrabold leading-tight">—</p>
            <p id="stat-melhor-margem-pct" class="text-sm opacity-75 mt-1 font-semibold"></p>
          </div>
        </div>
      </section>

      <!-- Filter Chips -->
      <div id="filter-chips-group" class="flex gap-2 mb-8 overflow-x-auto pb-2" data-filter-group>
        <button type="button" data-filter-chip aria-pressed="true" class="whitespace-nowrap px-5 py-2 rounded-full font-headline font-bold text-sm transition-all duration-200 active:scale-95 bg-primary text-on-primary shadow-md shadow-primary/20">Todas</button>
      </div>

      <!-- Recipe Grid -->
      <div id="recipe-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

        <!-- Skeleton cards shown while loading -->
        <div class="recipe-skeleton bg-surface-container-lowest rounded-2xl border border-slate-100 p-6 flex flex-col gap-4 animate-pulse">
          <div class="flex justify-between"><div class="h-5 w-20 bg-slate-200 rounded-full"></div><div class="h-5 w-16 bg-slate-200 rounded-full"></div></div>
          <div class="h-5 w-3/4 bg-slate-200 rounded"></div><div class="h-3 w-1/2 bg-slate-100 rounded"></div>
          <div class="border-t border-slate-100 pt-3 flex justify-between items-center"><div class="h-7 w-24 bg-slate-200 rounded"></div><div class="h-4 w-16 bg-slate-100 rounded"></div></div>
        </div>
        <div class="recipe-skeleton bg-surface-container-lowest rounded-2xl border border-slate-100 p-6 flex flex-col gap-4 animate-pulse">
          <div class="flex justify-between"><div class="h-5 w-20 bg-slate-200 rounded-full"></div><div class="h-5 w-16 bg-slate-200 rounded-full"></div></div>
          <div class="h-5 w-3/4 bg-slate-200 rounded"></div><div class="h-3 w-1/2 bg-slate-100 rounded"></div>
          <div class="border-t border-slate-100 pt-3 flex justify-between items-center"><div class="h-7 w-24 bg-slate-200 rounded"></div><div class="h-4 w-16 bg-slate-100 rounded"></div></div>
        </div>
        <div class="recipe-skeleton bg-surface-container-lowest rounded-2xl border border-slate-100 p-6 flex flex-col gap-4 animate-pulse">
          <div class="flex justify-between"><div class="h-5 w-20 bg-slate-200 rounded-full"></div><div class="h-5 w-16 bg-slate-200 rounded-full"></div></div>
          <div class="h-5 w-3/4 bg-slate-200 rounded"></div><div class="h-3 w-1/2 bg-slate-100 rounded"></div>
          <div class="border-t border-slate-100 pt-3 flex justify-between items-center"><div class="h-7 w-24 bg-slate-200 rounded"></div><div class="h-4 w-16 bg-slate-100 rounded"></div></div>
        </div>

      </div>
    </div>
  </main>
  <script src="assets/js/konditor-app.js" defer></script>
</body>
</html>
